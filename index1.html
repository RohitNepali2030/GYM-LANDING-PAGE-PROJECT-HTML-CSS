<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulbari GYM & Fitness Center</title>

    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Balsamiq Sans", sans-serif;
            margin: 0;
            padding: 0;
            color: white;
            background: url('img/bg.jpg') no-repeat center center/cover;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .left {
            position: absolute;
            left: 60px;
            top: 20px;
            display: inline-block;
        }

        .left img {
            width: 130px;
        }

        .left div {
            line-height: 20px;
            font-size: 20px;
            text-align: center;
        }

        .mid {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .navbar {
            display: flex;
            gap: 20px;
        }

        .navbar li {
            list-style: none;
        }

        .navbar li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 8px;
        }

        .navbar li a:hover,
        .navbar li a.active {
            color: gray;
            text-decoration: underline;
        }

        .right {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: 2px solid gray;
            background: black;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: gray;
        }

        /* FORM SECTION */
        .container {
            max-width: 500px;
            width: 90%;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .navbar {
                flex-direction: column;
                align-items: center;
            }

            .right {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="left">
            <img src="img/gym.jpg" alt="">
            <div>Fulbari GYM</div>
        </div>

        <div class="mid">
            <ul class="navbar">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Fitness</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div class="right">
            <button class="btn">Call Us</button>
            <button class="btn">Email Us</button>
        </div>
    </header>

    <div class="container">
        <h1>Join the Best Gym of Fulbari</h1>

        <form id="gymForm">
            <div class="form-group">
                <input type="text" placeholder="Enter Your Name" required>
            </div>

            <div class="form-group">
                <input type="number" placeholder="Enter Your Age" required>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Enter Your Gender" required>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Enter Your Location" required>
            </div>

            <button class="btn">Submit</button>
        </form>
    </div>

    <script>
        const form = document.getElementById("gymForm");

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            alert("Form submitted successfully!");
        });
    </script>

</body>

</html>
